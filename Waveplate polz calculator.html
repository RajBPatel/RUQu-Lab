<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Poincaré Sphere Polarization Simulator</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: monospace, sans-serif;
        background-color: #111;
        color: #fff;
        display: flex;
        height: 100vh;
      }

      #canvas-container {
        flex-grow: 1;
        position: relative;
      }

      /* Sidebar layout for dynamic content */
      #sidebar {
        width: 380px;
        background: #222;
        display: flex;
        flex-direction: column;
        border-left: 2px solid #444;
        z-index: 10;
      }

      /* Scrollable area for stages */
      #stages-container {
        flex-grow: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* Fixed header and footer inside sidebar */
      .fixed-panel {
        padding: 20px;
        background: #222;
        border-bottom: 2px solid #333;
      }
      #output-container {
        padding: 20px;
        background: #1a1a1a;
        border-top: 2px solid #333;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .control-group {
        background: #333;
        padding: 15px;
        border-radius: 8px;
        font-family: sans-serif;
        position: relative;
      }
      .control-group h3 {
        margin-top: 0;
        margin-bottom: 10px;
        font-size: 16px;
        border-bottom: 1px solid #555;
        padding-bottom: 5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .input-row {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
        gap: 10px;
      }
      .input-row label {
        flex-grow: 1;
      }
      input[type="range"] {
        width: 100%;
      }
      input[type="number"] {
        width: 65px;
        background: #444;
        color: white;
        border: 1px solid #555;
        padding: 4px;
        border-radius: 4px;
      }
      select {
        background: #444;
        color: white;
        border: 1px solid #555;
        padding: 4px;
        border-radius: 4px;
        width: 100%;
        margin-bottom: 10px;
      }

      .btn {
        cursor: pointer;
        padding: 8px 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        width: 100%;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #0056b3;
      }
      .btn-delete {
        background: #dc3545;
        padding: 4px 8px;
        font-size: 12px;
        width: auto;
      }
      .btn-delete:hover {
        background: #a71d2a;
      }

      .output-box {
        text-align: center;
        font-size: 16px;
        background: #222;
        padding: 10px;
        border-radius: 6px;
      }
      .quantum-text {
        font-weight: bold;
        font-size: 18px;
        letter-spacing: 1px;
      }
      #input-quantum {
        color: #00ffff;
      }
      #output-quantum {
        color: #ffff00;
      }

      .input-color {
        color: #00ffff;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #222;
      }
      ::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #777;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  </head>
  <body>
    <div id="canvas-container"></div>

    <div id="sidebar">
      <!-- Fixed Input Panel -->
      <div
        class="fixed-panel control-group"
        style="margin: 0; border-radius: 0"
      >
        <h3 class="input-color">Input State |&psi;<sub>in</sub>&rang;</h3>
        <div class="input-row">
          <label>Amp 'a' (|H&rang;): <span id="a_disp">1.00</span></label>
        </div>
        <input
          type="range"
          id="a_slider"
          value="1.0"
          step="0.01"
          min="0"
          max="1"
        />
        <div class="input-row" style="margin-top: -5px; margin-bottom: 10px">
          <label style="color: #aaa; font-size: 0.85em"
            >Amp 'b' (|V&rang;): <span id="b_disp">0.00</span></label
          >
        </div>
        <div class="input-row">
          <!-- Updated phase limits to -360 to +360 -->
          <label>Phase &phi; (&deg;):</label>
          <input
            type="number"
            id="phi_num"
            value="0"
            step="1"
            min="-360"
            max="360"
          />
        </div>
        <input
          type="range"
          id="phi_slider"
          value="0"
          step="1"
          min="-360"
          max="360"
        />
      </div>

      <!-- Scrollable Dynamic Stages -->
      <div id="stages-container">
        <button class="btn" id="btn-add-stage">+ Add Waveplate Stage</button>
        <!-- Stages will be injected here -->
      </div>

      <!-- Fixed Output Panel -->
      <div id="output-container">
        <div class="output-box quantum-text" id="input-quantum">
          |&psi;<sub>in</sub>&rang; = 1.000 |H&rang; + 0.000 |V&rang;
        </div>
        <div
          class="output-box"
          id="output-stokes"
          style="font-size: 14px; color: #ccc"
        >
          Stokes: [1.000, 0.000, 0.000]
        </div>
        <div class="output-box quantum-text" id="output-quantum">
          |&psi;<sub>out</sub>&rang; = 1.000 |H&rang; + 0.000 |V&rang;
        </div>
      </div>
    </div>

    <script>
      // --- 1. Scene Setup ---
      const container = document.getElementById("canvas-container");
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.1,
        100,
      );
      camera.position.set(2.5, 2.0, 3.5);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // --- 2. Static Sphere and Axes ---
      const sphereRadius = 1;
      const sphereGeo = new THREE.SphereGeometry(sphereRadius, 32, 32);
      const sphereMat = new THREE.MeshBasicMaterial({
        color: 0x444444,
        transparent: true,
        opacity: 0.2,
        wireframe: true,
      });
      scene.add(new THREE.Mesh(sphereGeo, sphereMat));

      // Equatorial Plane
      const planeGeo = new THREE.CircleGeometry(sphereRadius, 64);
      const planeMat = new THREE.MeshBasicMaterial({
        color: 0x808080,
        transparent: true,
        opacity: 0.5,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const equatorPlane = new THREE.Mesh(planeGeo, planeMat);
      equatorPlane.rotation.x = Math.PI / 2;
      scene.add(equatorPlane);

      function createAxis(p1, p2, color) {
        const mat = new THREE.LineBasicMaterial({
          color: color,
          transparent: true,
          opacity: 0.5,
        });
        const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
        return new THREE.Line(geo, mat);
      }

      scene.add(
        createAxis(
          new THREE.Vector3(-1.2, 0, 0),
          new THREE.Vector3(1.2, 0, 0),
          0xffffff,
        ),
      ); // H/V
      scene.add(
        createAxis(
          new THREE.Vector3(0, -1.2, 0),
          new THREE.Vector3(0, 1.2, 0),
          0xffffff,
        ),
      ); // R/L
      scene.add(
        createAxis(
          new THREE.Vector3(0, 0, -1.2),
          new THREE.Vector3(0, 0, 1.2),
          0xffffff,
        ),
      ); // D/A

      function createLabel(text, position, colorStr) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.width = 128;
        canvas.height = 128;
        context.font = "Bold 60px Arial";
        context.fillStyle = colorStr;
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.fillText(text, 64, 64);
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({
          map: texture,
          depthTest: false,
        });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.position.copy(position);
        sprite.scale.set(0.3, 0.3, 0.3);
        return sprite;
      }

      scene.add(createLabel("H", new THREE.Vector3(1.15, 0, 0), "white"));
      scene.add(createLabel("V", new THREE.Vector3(-1.15, 0, 0), "white"));
      scene.add(createLabel("R", new THREE.Vector3(0, 1.15, 0), "white"));
      scene.add(createLabel("L", new THREE.Vector3(0, -1.15, 0), "white"));
      scene.add(createLabel("D", new THREE.Vector3(0, 0, 1.15), "white"));
      scene.add(createLabel("A", new THREE.Vector3(0, 0, -1.15), "white"));

      // --- 3. Dynamic Elements & UI Logic ---
      const dynamicGroup = new THREE.Group();
      scene.add(dynamicGroup);

      // Color Palette for stages (HTML hex strings)
      const stageColors = [
        "#ff5555",
        "#55ff55",
        "#5555ff",
        "#ffff55",
        "#ffaa00",
        "#ff55ff",
        "#55ffff",
      ];
      let stageIdCounter = 0;
      let activeStages = []; // Array to hold stage state objects

      function addStageUI() {
        const id = stageIdCounter++;
        const colorStr = stageColors[activeStages.length % stageColors.length];
        const colorHex = parseInt(colorStr.replace("#", "0x"));

        // Create Stage Object
        const stage = {
          id: id,
          type: "QWP", // default
          angle: 22.5, // default
          enabled: true,
          colorStr: colorStr,
          colorHex: colorHex,
        };
        activeStages.push(stage);

        // Build DOM Element - Updated min/max limits to -360/360
        const stageDiv = document.createElement("div");
        stageDiv.className = "control-group";
        stageDiv.style.borderLeft = `4px solid ${colorStr}`;
        stageDiv.id = `stage-${id}`;

        stageDiv.innerHTML = `
            <h3 style="color: ${colorStr}">
                Stage ${activeStages.length} 
                <button class="btn btn-delete" onclick="removeStage(${id})">Delete</button>
            </h3>
            <div class="input-row">
                <label><input type="checkbox" id="en-${id}" checked> Enable</label>
            </div>
            <select id="type-${id}">
                <option value="QWP" selected>Quarter-Wave Plate (QWP)</option>
                <option value="HWP">Half-Wave Plate (HWP)</option>
                <option value="FWP">Full-Wave Plate (FWP)</option>
            </select>
            <div class="input-row">
                <label>Angle (&theta;):</label>
                <input type="number" id="num-${id}" value="${stage.angle}" step="0.1" min="-360" max="360">
            </div>
            <input type="range" id="slider-${id}" value="${stage.angle}" step="0.1" min="-360" max="360">
        `;

        // Insert before the "Add Stage" button
        const container = document.getElementById("stages-container");
        const addButton = document.getElementById("btn-add-stage");
        container.insertBefore(stageDiv, addButton);

        // Add Event Listeners
        document.getElementById(`en-${id}`).addEventListener("change", (e) => {
          stage.enabled = e.target.checked;
          updateSimulation();
        });
        document
          .getElementById(`type-${id}`)
          .addEventListener("change", (e) => {
            stage.type = e.target.value;
            updateSimulation();
          });
        const numInput = document.getElementById(`num-${id}`);
        const sliderInput = document.getElementById(`slider-${id}`);

        numInput.addEventListener("input", (e) => {
          sliderInput.value = e.target.value;
          stage.angle = parseFloat(e.target.value);
          updateSimulation();
        });
        sliderInput.addEventListener("input", (e) => {
          numInput.value = e.target.value;
          stage.angle = parseFloat(e.target.value);
          updateSimulation();
        });

        relabelStages();
        updateSimulation();
      }

      // Must be attached to window so inline onclick="removeStage()" works
      window.removeStage = function (id) {
        activeStages = activeStages.filter((s) => s.id !== id);
        document.getElementById(`stage-${id}`).remove();
        relabelStages();
        updateSimulation();
      };

      function relabelStages() {
        const stageDivs = document.querySelectorAll(
          "#stages-container .control-group",
        );
        stageDivs.forEach((div, index) => {
          const h3 = div.querySelector("h3");
          // Update Title number but preserve color and delete button
          const btnHtml = h3.innerHTML.match(/<button.*<\/button>/)[0];
          h3.innerHTML = `Stage ${index + 1} ${btnHtml}`;
        });
      }

      document
        .getElementById("btn-add-stage")
        .addEventListener("click", addStageUI);

      // --- 4. Drawing Utilities ---
      function drawArc(vStart, axis, angle, color) {
        const points = [];
        const segments = Math.max(30, Math.floor(angle * 20)); // More segments for larger angles
        for (let i = 0; i <= segments; i++) {
          const t = i / segments;
          const currentAngle = t * angle;
          const pt = vStart.clone().applyAxisAngle(axis, currentAngle);
          points.push(pt);
        }
        const geo = new THREE.BufferGeometry().setFromPoints(points);
        const mat = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
        return new THREE.Line(geo, mat);
      }

      function drawPoint(pos, color, size = 0.05) {
        const geo = new THREE.SphereGeometry(size, 16, 16);
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(pos);
        return mesh;
      }

      function drawRotationAxis(axisVec, color) {
        const p1 = axisVec.clone().multiplyScalar(1.1);
        const p2 = axisVec.clone().multiplyScalar(-1.1);
        const mat = new THREE.LineDashedMaterial({
          color: color,
          dashSize: 0.05,
          gapSize: 0.05,
        });
        const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
        const line = new THREE.Line(geo, mat);
        line.computeLineDistances();
        return line;
      }

      function formatQuantumState(S1, S2, S3, label = "|&psi;&rang;") {
        let cH = Math.sqrt(Math.max(0, (1 + S1) / 2));
        let cV_re = 0,
          cV_im = 0;

        if (cH > 0.0001) {
          cV_re = S2 / (2 * cH);
          cV_im = S3 / (2 * cH);
        } else {
          cH = 0;
          cV_re = 1;
          cV_im = 0;
        }

        const formatNum = (n) =>
          Math.abs(n) < 0.0005 ? "0.000" : n.toFixed(3);

        let cH_str = formatNum(cH);
        let cV_re_str = formatNum(cV_re);
        let cV_im_str = formatNum(Math.abs(cV_im));
        let sign = cV_im < 0 ? "-" : "+";

        let cV_term = `${cV_re_str} ${sign} ${cV_im_str}i`;

        if (Math.abs(cV_im) < 0.0005) cV_term = `${cV_re_str}`;
        else if (Math.abs(cV_re) < 0.0005)
          cV_term = `${sign === "-" ? "-" : ""}${cV_im_str}i`;

        if (Math.abs(cV_im) >= 0.0005 && Math.abs(cV_re) >= 0.0005)
          cV_term = `(${cV_term})`;

        if (cH === 0) return `${label} = ${cV_term} |V&rang;`;
        if (Math.abs(cV_re) < 0.0005 && Math.abs(cV_im) < 0.0005)
          return `${label} = ${cH_str} |H&rang;`;

        return `${label} = ${cH_str} |H&rang; + ${cV_term} |V&rang;`;
      }

      // --- 5. Main Simulation Loop ---
      function updateSimulation() {
        dynamicGroup.clear();

        // 1. Calculate Input State
        const a = parseFloat(document.getElementById("a_slider").value);
        const b = Math.sqrt(1 - a * a);
        document.getElementById("a_disp").innerText = a.toFixed(2);
        document.getElementById("b_disp").innerText = b.toFixed(2);

        const phi_rad =
          (parseFloat(document.getElementById("phi_num").value) * Math.PI) /
          180;

        const S1_in = a * a - b * b;
        const S2_in = 2 * a * b * Math.cos(phi_rad);
        const S3_in = 2 * a * b * Math.sin(phi_rad);

        document.getElementById("input-quantum").innerHTML = formatQuantumState(
          S1_in,
          S2_in,
          S3_in,
          "|&psi;<sub>in</sub>&rang;",
        );

        // Set initial Vector (X=H/V, Z=D/A, Y=R/L)
        let currentState = new THREE.Vector3(S1_in, S3_in, S2_in);
        dynamicGroup.add(drawPoint(currentState, 0x00ffff, 0.05));

        // 2. Iterate dynamically through active stages
        activeStages.forEach((stage) => {
          if (!stage.enabled) return; // Skip if bypassed

          const theta_rad = (stage.angle * Math.PI) / 180;
          const axisK = new THREE.Vector3(
            Math.cos(2 * theta_rad),
            0,
            Math.sin(2 * theta_rad),
          ).normalize();

          let delta;
          if (stage.type === "QWP") delta = Math.PI / 2;
          else if (stage.type === "HWP") delta = Math.PI;
          else if (stage.type === "FWP") delta = Math.PI * 2; // Full circle!

          // Draw Rotation Setup
          dynamicGroup.add(drawRotationAxis(axisK, stage.colorHex));
          dynamicGroup.add(drawArc(currentState, axisK, delta, stage.colorHex));

          // Apply Math
          currentState.applyAxisAngle(axisK, delta);
          dynamicGroup.add(drawPoint(currentState, stage.colorHex, 0.04));
        });

        // Highlight Final Target Destination Point
        dynamicGroup.add(drawPoint(currentState, 0xffff00, 0.07));

        // Output formatting
        document.getElementById("output-stokes").innerHTML =
          `Final Stokes [H/V, D/A, R/L]: [${currentState.x.toFixed(3)}, ${currentState.z.toFixed(3)}, ${currentState.y.toFixed(3)}]`;

        document.getElementById("output-quantum").innerHTML =
          formatQuantumState(
            currentState.x,
            currentState.z,
            currentState.y,
            "|&psi;<sub>out</sub>&rang;",
          );
      }

      // Input state event listeners
      document
        .getElementById("a_slider")
        .addEventListener("input", updateSimulation);
      document.getElementById("phi_num").addEventListener("input", (e) => {
        document.getElementById("phi_slider").value = e.target.value;
        updateSimulation();
      });
      document.getElementById("phi_slider").addEventListener("input", (e) => {
        document.getElementById("phi_num").value = e.target.value;
        updateSimulation();
      });

      // Handle resizing gracefully with side panel
      window.addEventListener("resize", () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });

      // --- 6. Init ---
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }

      // Initialize with a default setup (e.g. QWP -> HWP -> QWP)
      addStageUI();
      document.getElementById(`type-${activeStages[0].id}`).value = "QWP";
      addStageUI();
      document.getElementById(`type-${activeStages[1].id}`).value = "HWP";
      document.getElementById(`num-${activeStages[1].id}`).value = 45;
      document.getElementById(`slider-${activeStages[1].id}`).value = 45;
      activeStages[1].angle = 45;
      addStageUI();
      document.getElementById(`type-${activeStages[2].id}`).value = "QWP";

      updateSimulation();
      animate();
    </script>
  </body>
</html>
