<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>RUQu Lab</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Monda:wght@400;700&family=Saira:wght@600;700;800&display=swap" rel="stylesheet">

        <style>
            /* Same design tokens as the dashboard (dashboard/app/globals.css) and
               digest (pipeline/digest.py) — not a reinterpretation, copied 1:1 so
               this prompt reads as the same product, not a bolted-on gate. */
            :root {
                color-scheme: light dark;
                --surface-1: #ffffff;
                --surface-2: #f4f5f7;
                --surface-3: #eceef1;
                --text-1: #10131a;
                --text-2: #5a6472;
                --text-3: #8b94a3;
                --border: rgba(16,19,26,0.09);
                --border-strong: rgba(16,19,26,0.16);
                --accent: #6366f1;
                --shadow: 0 1px 2px rgba(16,19,26,0.04), 0 8px 24px -12px rgba(16,19,26,0.12);
                --radius: 18px;
                --radius-sm: 11px;
                --error: #ef4444;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --surface-1: #16181d;
                    --surface-2: #0c0d10;
                    --surface-3: #1e2128;
                    --text-1: #f3f4f6;
                    --text-2: #a5adba;
                    --text-3: #6b7280;
                    --border: rgba(255,255,255,0.09);
                    --border-strong: rgba(255,255,255,0.17);
                    --accent: #818cf8;
                    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px -12px rgba(0,0,0,0.5);
                }
            }

            * { box-sizing: border-box; }

            .staticrypt-html, .staticrypt-body { height: 100%; margin: 0; }

            .staticrypt-content {
                height: 100%;
                min-height: 100vh;
                margin: 0;
                background: var(--surface-2);
                color: var(--text-1);
                font-family: 'Monda', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem;
            }

            .staticrypt-page { width: 100%; max-width: 380px; padding: 0; margin: 0; box-sizing: border-box; }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--surface-1);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                max-width: 380px;
                margin: 0 auto;
                padding: 2.2rem 2rem;
                text-align: center;
            }

            .staticrypt-logo { width: 3.6rem; height: auto; color: var(--text-1); margin: 0 auto 1rem; }
            .staticrypt-logo svg { display: block; width: 100%; height: auto; }

            .staticrypt-title {
                font-family: 'Saira', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
                font-size: 1.4rem;
                font-weight: 800;
                letter-spacing: -0.01em;
                color: var(--text-1);
                margin: 0 0 0.4rem;
            }

            .staticrypt-instructions p:not(.staticrypt-title) {
                font-size: 0.88rem;
                color: var(--text-2);
                margin: 0;
                line-height: 1.5;
            }

            .staticrypt-hr { margin: 1.3rem 0; border: 0; border-top: 1px solid var(--border); }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box;
                font: inherit;
                font-size: 0.92rem;
                color: var(--text-1);
                outline: 0;
                padding: 0.75rem 2.2rem 0.75rem 0.9rem;
                width: 100%;
            }
            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder { color: var(--text-3); }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: var(--surface-2);
                border: 1px solid var(--border-strong);
                border-radius: var(--radius-sm);
                width: 100%;
                margin: 0 0 1rem;
                box-sizing: border-box;
                transition: border-color 0.15s, box-shadow 0.15s;
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.55;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
            }
            @media (prefers-color-scheme: dark) {
                .staticrypt-toggle-password-visibility { filter: invert(1); opacity: 0.7; }
            }

            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: var(--accent);
                width: 100%;
                border: 0;
                border-radius: var(--radius-sm);
                padding: 0.75rem;
                color: #ffffff;
                font: inherit;
                font-weight: 650;
                font-size: 0.92rem;
                cursor: pointer;
                transition: filter 0.15s, transform 0.1s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover { filter: brightness(1.08); }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: scale(0.98); }

            .staticrypt-error {
                margin: 0.9rem 0 0;
                font-size: 0.82rem;
                font-weight: 650;
                color: var(--error);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                margin-bottom: 1rem;
                font-size: 0.85rem;
                color: var(--text-2);
            }
            .staticrypt-remember input[type="checkbox"] { accent-color: var(--accent); width: 1rem; height: 1rem; }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--surface-2);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid var(--border-strong);
                border-right-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

        <script>
            // these variables will be filled when generating the file - the template format is 'variable_name'
            const staticryptInitiator = ((function(){
  const exports = {};
  const cryptoEngine = ((function(){
  const exports = {};
  const { subtle } = crypto;

const IV_BITS = 16 * 8;
const HEX_BITS = 4;
const ENCRYPTION_ALGO = "AES-CBC";

/**
 * Translates between utf8 encoded hexadecimal strings
 * and Uint8Array bytes.
 */
const HexEncoder = {
    /**
     * hex string -> bytes
     * @param {string} hexString
     * @returns {Uint8Array}
     */
    parse: function (hexString) {
        if (hexString.length % 2 !== 0) throw "Invalid hexString";
        const arrayBuffer = new Uint8Array(hexString.length / 2);

        for (let i = 0; i < hexString.length; i += 2) {
            const byteValue = parseInt(hexString.substring(i, i + 2), 16);
            if (isNaN(byteValue)) {
                throw "Invalid hexString";
            }
            arrayBuffer[i / 2] = byteValue;
        }
        return arrayBuffer;
    },

    /**
     * bytes -> hex string
     * @param {Uint8Array} bytes
     * @returns {string}
     */
    stringify: function (bytes) {
        const hexBytes = [];

        for (let i = 0; i < bytes.length; ++i) {
            let byteString = bytes[i].toString(16);
            if (byteString.length < 2) {
                byteString = "0" + byteString;
            }
            hexBytes.push(byteString);
        }
        return hexBytes.join("");
    },
};

/**
 * Translates between utf8 strings and Uint8Array bytes.
 */
const UTF8Encoder = {
    parse: function (str) {
        return new TextEncoder().encode(str);
    },

    stringify: function (bytes) {
        return new TextDecoder().decode(bytes);
    },
};

/**
 * Salt and encrypt a msg with a password.
 */
async function encrypt(msg, hashedPassword) {
    // Must be 16 bytes, unpredictable, and preferably cryptographically random. However, it need not be secret.
    // https://developer.mozilla.org/en-US/docs/Web/API/SubtleCrypto/encrypt#parameters
    const iv = crypto.getRandomValues(new Uint8Array(IV_BITS / 8));

    const key = await subtle.importKey("raw", HexEncoder.parse(hashedPassword), ENCRYPTION_ALGO, false, ["encrypt"]);

    const encrypted = await subtle.encrypt(
        {
            name: ENCRYPTION_ALGO,
            iv: iv,
        },
        key,
        UTF8Encoder.parse(msg)
    );

    // iv will be 32 hex characters, we prepend it to the ciphertext for use in decryption
    return HexEncoder.stringify(iv) + HexEncoder.stringify(new Uint8Array(encrypted));
}
exports.encrypt = encrypt;

/**
 * Decrypt a salted msg using a password.
 *
 * @param {string} encryptedMsg
 * @param {string} hashedPassword
 * @returns {Promise<string>}
 */
async function decrypt(encryptedMsg, hashedPassword) {
    const ivLength = IV_BITS / HEX_BITS;
    const iv = HexEncoder.parse(encryptedMsg.substring(0, ivLength));
    const encrypted = encryptedMsg.substring(ivLength);

    const key = await subtle.importKey("raw", HexEncoder.parse(hashedPassword), ENCRYPTION_ALGO, false, ["decrypt"]);

    const outBuffer = await subtle.decrypt(
        {
            name: ENCRYPTION_ALGO,
            iv: iv,
        },
        key,
        HexEncoder.parse(encrypted)
    );

    return UTF8Encoder.stringify(new Uint8Array(outBuffer));
}
exports.decrypt = decrypt;

/**
 * Salt and hash the password so it can be stored in localStorage without opening a password reuse vulnerability.
 *
 * @param {string} password
 * @param {string} salt
 * @returns {Promise<string>}
 */
async function hashPassword(password, salt) {
    // we hash the password in multiple steps, each adding more iterations. This is because we used to allow less
    // iterations, so for backward compatibility reasons, we need to support going from that to more iterations.
    let hashedPassword = await hashLegacyRound(password, salt);

    hashedPassword = await hashSecondRound(hashedPassword, salt);

    return hashThirdRound(hashedPassword, salt);
}
exports.hashPassword = hashPassword;

/**
 * This hashes the password with 1k iterations. This is a low number, we need this function to support backwards
 * compatibility.
 *
 * @param {string} password
 * @param {string} salt
 * @returns {Promise<string>}

    return pbkdf2(password, salt, 1000, "SHA-1");
}
exports.hashLegacyRound = hashLegacyRound;

/**
 * Add a second round of iterations. This is because we used to use 1k, so for backwards compatibility with
 * remember-me/autodecrypt links, we need to support going from that to more iterations.
 *
 * @param hashedPassword
 * @param salt
 * @returns {Promise<string>}
 */
function hashSecondRound(hashedPassword, salt) {
    return pbkdf2(hashedPassword, salt, 14000, "SHA-256");
}
exports.hashSecondRound = hashSecondRound;

/**
 * Add a third round of iterations to bring total number to 600k. This is because we used to use 1k, then 15k, so for
 * backwards compatibility with remember-me/autodecrypt links, we need to support going from that to more iterations.
 *
 * @param hashedPassword
 * @param salt
